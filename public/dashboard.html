<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard CEPM</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#0f172a;
    color:white;
    display:flex;
    min-height:100vh;
}

.sidebar{
    width:250px;
    background:#111827;
    padding:20px;
    position:fixed;
    height:100vh;
}

.sidebar h2{
    margin-bottom:30px;
    text-align:center;
}

.sidebar button{
    width:100%;
    margin-bottom:15px;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#2563eb;
    color:white;
    cursor:pointer;
    font-size:15px;
}

.sidebar button:hover{
    background:#1d4ed8;
}

.main{
    margin-left:250px;
    padding:30px;
    width:100%;
}

.card{
    background:#1e293b;
    padding:25px;
    border-radius:20px;
    margin-bottom:20px;
}

input,select{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    margin-top:10px;
    margin-bottom:15px;
    background:#334155;
    color:white;
}

input::placeholder{
    color:#cbd5e1;
}

button.action{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#22c55e;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

button.action:hover{
    background:#16a34a;
}

.usuario{
    background:#334155;
    padding:15px;
    border-radius:15px;
    margin-top:10px;
}

.top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

.logout{
    background:#ef4444;
    border:none;
    padding:10px 15px;
    border-radius:10px;
    color:white;
    cursor:pointer;
}

@media(max-width:768px){

    body{
        flex-direction:column;
    }

    .sidebar{
        position:relative;
        width:100%;
        height:auto;
    }

    .main{
        margin-left:0;
    }
}

</style>
</head>
<body>

<div class="sidebar">

    <h2>🎓 CEPM</h2>

    <button onclick="mostrar('inicio')">
        🏠 Inicio
    </button>

    <button onclick="mostrar('alumnos')">
        👨‍🎓 Alumnos
    </button>

    <button onclick="mostrar('maestros')">
        👨‍🏫 Maestros
    </button>

    <button onclick="mostrar('materias')">
    📚 Materias
    </button>

    <button onclick="mostrar('clases')">
        🏫 Clases
    </button>

</div>

<div class="main">

    <div class="top">

        <h1>Dashboard</h1>

        <button class="logout" onclick="logout()">
            Cerrar sesión
        </button>

    </div>

    <!-- INICIO -->

    <div id="inicio" class="card">

        <h2>
            Bienvenido 😎🔥
        </h2>

        <p style="margin-top:15px;">
            Plataforma Escolar CEPM v2
        </p>

    </div>

    <!-- ALUMNOS -->

    <div id="alumnos" class="card" style="display:none;">

        <h2>
            👨‍🎓 Agregar Alumno
        </h2>

        <input
            type="text"
            id="nombreAlumno"
            placeholder="Nombre alumno"
        >

        <input
            type="text"
            id="usuarioAlumno"
            placeholder="Usuario"
        >

        <input
            type="email"
            id="emailAlumno"
            placeholder="Correo electrónico"
        >

        <input
            type="password"
            id="passwordAlumno"
            placeholder="Contraseña"
        >

        <button
            class="action"
            onclick="crearAlumno()"
        >
            Crear Alumno
        </button>

        <div id="listaAlumnos"></div>

    </div>

    <!-- MAESTROS -->

    <div id="maestros" class="card" style="display:none;">

        <h2>
            👨‍🏫 Agregar Maestro
        </h2>

        <input
            type="text"
            id="nombreMaestro"
            placeholder="Nombre maestro"
        >

        <input
            type="text"
            id="usuarioMaestro"
            placeholder="Usuario"
        >

        <input
            type="email"
            id="emailMaestro"
            placeholder="Correo electrónico"
        >

        <input
            type="password"
            id="passwordMaestro"
            placeholder="Contraseña"
        >

        <button
            class="action"
            onclick="crearMaestro()"
        >
            Crear Maestro
        </button>

        <div id="listaMaestros"></div>

    </div>

    <h2>
👨‍👩‍👧 Crear Padre
</h2>

<input
id="nombrePadre"
placeholder="Nombre">

<input
id="emailPadre"
placeholder="Correo">

<input
id="usuarioPadre"
placeholder="Usuario">

<input
id="passwordPadre"
placeholder="Contraseña">

<select id="hijosPadre" multiple>

</select>

<button onclick="crearPadre()">
Crear Padre
</button>




    <!-- MATERIAS -->

<div id="materias"
class="card"
style="display:none;">

    <h2>
        📚 Crear Materia
    </h2>

    <input
        type="text"
        id="nombreMateria"
        placeholder="Nombre materia"
    >

    <button
        class="action"
        onclick="crearMateria()"
    >
        Crear Materia
    </button>

    <div id="listaMaterias"></div>

</div>

<!-- CLASES -->

<div id="clases"
class="card"
style="display:none;">

    <h2>
        🏫 Crear Clase
    </h2>

    <select id="materiaClase"></select>

    <select id="maestroClase"></select>

    <input
        type="text"
        id="grupoClase"
        placeholder="Grupo"
    >

    <input
        type="text"
        id="horarioClase"
        placeholder="Horario"
    >

    <input
        type="text"
        id="aulaClase"
        placeholder="Aula"
    >

    <input
    type="date"
    id="fechaInicioClase"
>

<input
    type="number"
    id="duracionClase"
    placeholder="Duración en semanas"
>

<input
    type="date"
    id="fechaFinClase"
>

    <button
        class="action"
        onclick="crearClase()"
    >
        Crear Clase
    </button>

    <div id="listaClases"></div>

</div>

    

</div>

<script>

const API =
'https://cepm-v2.onrender.com'

const token =
localStorage.getItem('token')

if(!token){

    location.href='/'
}

// 🔥 CAMBIAR VISTAS

function mostrar(id){

    document
    .querySelectorAll('.card')

    .forEach(c=>{

        c.style.display='none'
    })

    document
    .getElementById(id)

    .style.display='block'
}

// 🔥 LOGOUT

function logout(){

    localStorage.removeItem('token')

    location.href='/'
}

// =====================
// 👨‍🎓 CREAR ALUMNO
// =====================

async function crearAlumno(){

    const nombre =
    document.getElementById(
        'nombreAlumno'
    ).value

    const edad = 18

    const usuario =
    document.getElementById(
        'usuarioAlumno'
    ).value

    const password =
    document.getElementById(
        'passwordAlumno'
    ).value

    const email =
    document.getElementById(
        'emailAlumno'
    ).value

    // 🔥 CREAR ALUMNO

    const alumnoRes =
    await fetch(

        `${API}/alumnos`,

        {

            method:'POST',

            headers:{

                'Content-Type':
                'application/json',

                Authorization:
                token
            },

            body:JSON.stringify({

                nombre,

                edad
            })
        }
    )

    const alumno =
    await alumnoRes.json()

    // 🔥 CREAR USUARIO

    const userRes =
    await fetch(

        `${API}/registro`,

        {

            method:'POST',

            headers:{

                'Content-Type':
                'application/json',

                Authorization:
                token
            },

            body:JSON.stringify({

                nombre,

                usuario,

                password,

                email,

                rol:'alumno',

                alumnoId:
                alumno._id
            })
        }
    )

    const data =
    await userRes.json()

    alert(data.mensaje)

    cargarUsuarios()
}
// =====================
// 👨‍🏫 CREAR MAESTRO
// =====================

async function crearMaestro(){

    const nombre =
    document.getElementById(
        'nombreMaestro'
    ).value

    const usuario =
    document.getElementById(
        'usuarioMaestro'
    ).value

    const email =
    document.getElementById(
        'emailMaestro'
    ).value

    const password =
    document.getElementById(
        'passwordMaestro'
    ).value

    const res = await fetch(

        `${API}/registro`,

        {

            method:'POST',

            headers:{

                'Content-Type':
                'application/json',

                Authorization:
                token
            },

            body:JSON.stringify({

                nombre,

                usuario,

                email,

                password,

                rol:'maestro'
            })
        }
    )

    const data =
    await res.json()

    alert(data.mensaje)

    cargarUsuarios()
}

// =====================
// 📚 CREAR MATERIA
// =====================

async function crearMateria(){

    const nombre =
    document.getElementById(
        'nombreMateria'
    ).value

    const res =
    await fetch(

        `${API}/materias`,

        {

            method:'POST',

            headers:{

                'Content-Type':
                'application/json',

                Authorization:
                token
            },

            body:JSON.stringify({

                nombre
            })
        }
    )

    const data =
    await res.json()

    alert(data.mensaje)

    cargarMaterias()
}

// =====================
// 📚 CARGAR MATERIAS
// =====================

async function cargarMaterias(){

    const res =
    await fetch(

        `${API}/materias`,

        {

            headers:{
                Authorization:token
            }
        }
    )

    const materias =
    await res.json()

    document
    .getElementById(
        'listaMaterias'
    )

    .innerHTML = materias.map(m=>`

        <div class="usuario">

            📚 ${m.nombre}

        </div>

    `).join('')

    document
    .getElementById(
        'materiaClase'
    )

    .innerHTML = materias.map(m=>`

        <option value="${m._id}">
            ${m.nombre}
        </option>

    `).join('')
}

// =====================
// 🏫 CREAR CLASE
// =====================

async function crearClase(){

    const materiaId =
    document.getElementById(
        'materiaClase'
    ).value

    const maestroId =
    document.getElementById(
        'maestroClase'
    ).value

    const grupo =
    document.getElementById(
        'grupoClase'
    ).value

    const horario =
    document.getElementById(
        'horarioClase'
    ).value

    const aula =
    document.getElementById(
        'aulaClase'
    ).value

    const fechaInicio =
document.getElementById(
'fechaInicioClase'
).value

const duracion =
document.getElementById(
'duracionClase'
).value

const fechaFin =
document.getElementById(
'fechaFinClase'
).value

    const res =
    await fetch(

        `${API}/clases`,

        {

            method:'POST',

            headers:{

                'Content-Type':
                'application/json',

                Authorization:
                token
            },

            body:JSON.stringify({

                materiaId,

                maestroId,

                grupo,

                horario,

                aula,

                fechaInicio,

                duracion,

                fechaFin
            })
        }
    )

    const data =
    await res.json()

    alert(data.mensaje)

    cargarClases()
}

// =====================
// 🏫 CARGAR CLASES
// =====================

async function cargarClases(){

    const res =
    await fetch(

        `${API}/clases`,

        {

            headers:{
                Authorization:token
            }
        }
    )

    const clases =
    await res.json()

    document
    .getElementById(
        'listaClases'
    )

    .innerHTML = clases.map(c=>`

<div class="usuario">

    🏫 ${c.grupo}

    <br>

    ⏰ ${c.horario}

    <br>

    🚪 ${c.aula}

    <br><br>

    <button
    onclick="abrirClase('${c._id}')"
    >

        Ver Clase

    </button>

</div>

`).join('')
}

cargarMaterias()
cargarClases()

// =====================
// 👨‍🎓 VER CLASE
// =====================

async function abrirClase(id){

    const resClases =
    await fetch(

        `${API}/clases`,

        {

            headers:{
                Authorization:token
            }
        }
    )

    const clases =
    await resClases.json()

    const clase =
    clases.find(c=>c._id===id)

    const resAlumnos =
    await fetch(

        `${API}/alumnos`,

        {

            headers:{
                Authorization:token
            }
        }
    )

    const alumnos =
    await resAlumnos.json()

    const disponibles =
    alumnos.filter(a=>

        !clase.alumnos.includes(a._id)
    )

const inscritos =
alumnos.filter(a=>

    clase.alumnos.includes(a._id)
)

const html = `

<div class="card">

    <h2>
        👨‍🎓 Clase
    </h2>

    <p>
        👥 Inscritos:
        ${inscritos.length}
    </p>

    <br>

    ${inscritos.map(a=>`

        <div class="usuario">

            👨‍🎓 ${a.nombre}

        </div>

    `).join('')}

    <br>

    <h2>
        ➕ Agregar alumno
    </h2>

    <select id="alumnoClase">

        ${disponibles.map(a=>`

            <option value="${a._id}">
                ${a.nombre}
            </option>

        `).join('')}

    </select>

    <button
    class="action"

    onclick="agregarAlumnoClase('${id}')"
    >

        Agregar Alumno

    </button>

</div>
`

    document
    .getElementById(
        'listaClases'
    )

    .innerHTML = html
}

// =====================
// 👨‍🎓 AGREGAR ALUMNO
// =====================

async function agregarAlumnoClase(id){

    const alumnoId =
    document.getElementById(
        'alumnoClase'
    ).value

    const res =
    await fetch(

        `${API}/clases/${id}/alumnos`,

        {

            method:'PUT',

            headers:{

                'Content-Type':
                'application/json',

                Authorization:
                token
            },

            body:JSON.stringify({

                alumnos:[alumnoId]
            })
        }
    )

    const data =
    await res.json()

    alert(data.mensaje)

    cargarClases()
}


// =====================
// 📦 CARGAR USUARIOS
// =====================

async function cargarUsuarios(){

    const res =
    await fetch(

        `${API}/usuarios`,

        {

            headers:{
                Authorization:
                token
            }
        }
    )

    const alumnos =
    await fetch(

        `${API}/alumnos`,

        {
            headers:{
                Authorization:token
            }
        }
    )

    .then(r=>r.json())

document
.getElementById('hijosPadre')

.innerHTML = alumnos.map(a=>`

<option value="${a._id}">
    ${a.nombre}
</option>

`).join('')

    // 👨‍🎓

    document
    .getElementById(
        'listaAlumnos'
    )

    .innerHTML = alumnos.map(u=>`

        <div class="usuario">

            👨‍🎓 ${u.nombre}
            <br>
            Usuario:
            ${u.usuario}

        </div>

    `).join('')

    // 👨‍🏫

    document
    .getElementById(
        'listaMaestros'
    )

    .innerHTML = maestros.map(u=>`

        <div class="usuario">

            👨‍🏫 ${u.nombre}
            <br>
            Usuario:
            ${u.usuario}

        </div>

    `).join('')
}

cargarUsuarios()

</script>

</body>
</html>
