<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Panel Alumno</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#0f172a;
    color:white;
    display:flex;
}

.sidebar{

    width:250px;
    min-height:100vh;
    background:#111827;
    padding:20px;
}

.sidebar h1{

    margin-bottom:30px;
}

.sidebar button{

    width:100%;
    margin-bottom:15px;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#2563eb;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

.sidebar button:hover{

    background:#1d4ed8;
}

.main{

    flex:1;
    padding:30px;
}

.card{

    background:#1e293b;
    padding:20px;
    border-radius:20px;
    margin-bottom:20px;
}

.materia{

    background:#334155;
    padding:15px;
    border-radius:12px;
    margin-top:15px;
}

.promedio{

    font-size:50px;
    font-weight:bold;
    margin-top:15px;
}

.verde{

    color:#22c55e;
}

.amarillo{

    color:#eab308;
}

.rojo{

    color:#ef4444;
}

.tarea{

    background:#334155;
    padding:15px;
    border-radius:12px;
    margin-top:10px;
}

.asistencia{

    background:#334155;
    padding:15px;
    border-radius:12px;
    margin-top:10px;
}

</style>

</head>

<body>

<div class="sidebar">

    <h1>
        👨‍🎓 Alumno
    </h1>

    <button onclick="mostrar('inicio')">
        🏠 Inicio
    </button>

    <button onclick="mostrar('materias')">
        📚 Materias
    </button>

    <button onclick="mostrar('tareas')">
        📝 Tareas
    </button>

    <button onclick="mostrar('asistencias')">
        📅 Asistencias
    </button>

    <button onclick="logout()">
        🚪 Salir
    </button>

</div>

<div class="main">

    <!-- INICIO -->

    <div id="inicio" class="card">

        <h2 id="bienvenida">
            Bienvenido
        </h2>

        <div
            id="promedio"
            class="promedio"
        >
            0
        </div>

    </div>

    <!-- MATERIAS -->

    <div
        id="materias"
        class="card"
        style="display:none;"
    >

        <h2>
            📚 Mis materias
        </h2>

        <div id="listaMaterias"></div>

    </div>

    <!-- TAREAS -->

    <div
        id="tareas"
        class="card"
        style="display:none;"
    >

        <h2>
            📝 Mis tareas
        </h2>

        <div id="listaTareas"></div>

    </div>

    <!-- ASISTENCIAS -->

    <div
        id="asistencias"
        class="card"
        style="display:none;"
    >

        <h2>
            📅 Mis asistencias
        </h2>

        <div id="listaAsistencias"></div>

    </div>

</div>

<script>

const API =
'https://cepm-v2.onrender.com'

const token =
localStorage.getItem('token')

function mostrar(id){

    const secciones = [

        'inicio',

        'materias',

        'tareas',

        'asistencias'
    ]

    secciones.forEach(sec=>{

        document
        .getElementById(sec)
        .style.display='none'
    })

    document
    .getElementById(id)
    .style.display='block'
}

async function cargarAlumno(){

    const usuario =
    JSON.parse(

        atob(

            token.split('.')[1]
        )
    )

    // 🔥 USUARIOS

    const usuarios =
    await fetch(

        `${API}/usuarios`,

        {

            headers:{
                Authorization:token
            }
        }

    ).then(r=>r.json())

    const alumnoUser =
    usuarios.find(u=>

        u._id===usuario.id
    )
    console.log(alumnoUser)

    // 🔥 ALUMNOS

    const alumnos =
    await fetch(

        `${API}/alumnos`,

        {

            headers:{
                Authorization:token
            }
        }

    ).then(r=>r.json())

    const alumno =
    alumnos.find(a=>

        a._id == alumnoUser.alumnoId
    )

    document
    .getElementById('bienvenida')
    .innerHTML = `

    Bienvenido,
    ${alumno.nombre}
    😎🔥
    `

    // 🔥 CLASES

    const clases =
    await fetch(

        `${API}/clases`,

        {

            headers:{
                Authorization:token
            }
        }

    ).then(r=>r.json())

    const misClases =
    clases.filter(c=>

        c.alumnos.includes(
            alumno._id
        )
    )

    // 🔥 CALIFICACIONES

    const calificaciones =
    await fetch(

        `${API}/calificaciones`,

        {

            headers:{
                Authorization:token
            }
        }

    ).then(r=>r.json())

    const materiasDiv =
    document.getElementById(
        'listaMaterias'
    )

    materiasDiv.innerHTML=''

    let suma = 0
    let total = 0

    for(const clase of misClases){

        const calificacion =
        calificaciones.find(c=>

            c.claseId===clase._id &&

            c.alumnoId===alumno._id
        )

        let textoCalificacion =
        '⏳ Pendiente'

        if(calificacion){

            textoCalificacion =
            `✅ ${calificacion.calificacion}`

            suma += Number(
                calificacion.calificacion
            )

            total++
        }

        materiasDiv.innerHTML += `

        <div class="materia">

            <h3>
                📘 ${clase.grupo}
            </h3>

            <p style="margin-top:10px;">

                ${textoCalificacion}

            </p>

        </div>
        `
    }

    // 🔥 PROMEDIO

    let promedio = 0

    if(total>0){

        promedio = (
            suma / total
        ).toFixed(1)
    }

    const promedioDiv =
    document.getElementById(
        'promedio'
    )

    promedioDiv.innerHTML =
    promedio

    if(promedio>=9){

        promedioDiv.classList.add(
            'verde'
        )

    }else if(promedio>=7){

        promedioDiv.classList.add(
            'amarillo'
        )

    }else{

        promedioDiv.classList.add(
            'rojo'
        )
    }

    // 🔥 TAREAS

    const tareas =
    await fetch(

        `${API}/tareas`,

        {

            headers:{
                Authorization:token
            }
        }

    ).then(r=>r.json())

    const tareasDiv =
    document.getElementById(
        'listaTareas'
    )

    tareasDiv.innerHTML=''

    const misTareas =
    tareas.filter(t=>

        misClases.some(c=>

            c._id===t.claseId
        )
    )

    misTareas.forEach(t=>{

        tareasDiv.innerHTML += `

        <div class="tarea">

            <h3>
                📝 ${t.titulo}
            </h3>

            <p style="margin-top:10px;">
                ${t.descripcion}
            </p>

            <p style="margin-top:10px;">
                📅 ${t.fechaEntrega}
            </p>

        </div>
        `
    })

    /*

   // 🔥 ASISTENCIAS

    const asistencias =
    await fetch(

        `${API}/asistencia`,

        {

            headers:{
                Authorization:token
            }
        }

    ).then(r=>r.json())

    const misAsistencias =
    asistencias.filter(a=>

        a.alumnoId===alumno._id
    )

    const asistenciaDiv =
    document.getElementById(
        'listaAsistencias'
    )

    asistenciaDiv.innerHTML=''

    misAsistencias.forEach(a=>{

        asistenciaDiv.innerHTML += `

        <div class="asistencia">

            <p>
                📅 ${a.fecha}
            </p>

            <p style="margin-top:10px;">

                ${a.estado}

            </p>

        </div>
        `
    })
        */
}  

function logout(){

    localStorage.clear()

    location.href='index.html'
}

cargarAlumno()

</script>

</body>
</html>
