<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Panel Maestro</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#0f172a;
    color:white;
    display:flex;
}

.sidebar{

    width:250px;
    min-height:100vh;
    background:#111827;
    padding:20px;
}

.sidebar h1{

    margin-bottom:30px;
}

.sidebar button{

    width:100%;
    margin-bottom:15px;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#2563eb;
    color:white;
    font-size:16px;
    cursor:pointer;
}

.main{

    flex:1;
    padding:30px;
}

.card{

    background:#1e293b;
    padding:20px;
    border-radius:20px;
    margin-bottom:20px;
}

input{

    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    margin-top:10px;
    margin-bottom:10px;
}

button.action{

    background:#22c55e;
    color:white;
    border:none;
    padding:12px;
    width:100%;
    border-radius:10px;
    cursor:pointer;
}

.alumno{

    background:#334155;
    padding:15px;
    border-radius:12px;
    margin-top:10px;
}

</style>

</head>

<body>

<div class="sidebar">

    <h1>
        👨‍🏫 Maestro
    </h1>

    <button onclick="mostrar('clases')">
        📚 Mis clases
    </button>

    <button onclick="logout()">
        🚪 Salir
    </button>

</div>

<div class="main">

    <!-- CLASES -->

    <div id="clases" class="card">

        <h2>
            📚 Mis clases
        </h2>

        <div id="listaClases"></div>

    </div>

</div>

<script>

const API =
'https://cepm-v2.onrender.com'

const token =
localStorage.getItem('token')

async function cargarClases(){

    // 🔥 CLASES

    const res =
    await fetch(

        `${API}/clases`,

        {

            headers:{
                Authorization:token
            }
        }
    )

    const clases =
    await res.json()

    // 🔥 ALUMNOS

    const alumnos =
    await fetch(

        `${API}/alumnos`,

        {

            headers:{
                Authorization:token
            }
        }

    ).then(r=>r.json())


    const calificaciones =
await fetch(

    `${API}/calificaciones`,

    {

        headers:{
            Authorization:token
        }
    }

).then(r=>r.json())

    // 🔥 TOKEN

    const maestro =
    JSON.parse(

        atob(

            token.split('.')[1]
        )
    )

    // 🔥 SOLO CLASES DEL MAESTRO

    const misClases =
    clases.filter(c=>

        c.maestroId===maestro.id
    )

    const contenedor =
    document.getElementById(
        'listaClases'
    )

    contenedor.innerHTML=''

    // 🔥 RECORRER CLASES

    for(const clase of misClases){

        // 🔥 ALUMNOS DE ESA CLASE

        const alumnosClase =
        alumnos.filter(a=>

            clase.alumnos.includes(
                a._id
            )
        )

        contenedor.innerHTML += `

        <div class="card">

            <h3>
                📘 ${clase.grupo}
            </h3>

            <p>
                👨‍🎓 ${alumnosClase.length} alumnos
            </p>

            <div style="margin-top:20px;">

    <input
        type="text"
        id="titulo-${clase._id}"
        placeholder="Título tarea"
    >

    <input
        type="text"
        id="desc-${clase._id}"
        placeholder="Descripción"
    >

    <input
        type="date"
        id="fecha-${clase._id}"
    >

    <button
        class="action"

        onclick="
        crearTarea(
            '${clase._id}'
        )
        "
    >

        Crear tarea

    </button>

</div>

 ${alumnosClase.map(a=>{

    const yaCalificado =
    calificaciones.find(c=>

        c.claseId===clase._id &&

        c.alumnoId===a._id
    )

    if(yaCalificado){

        return `

        <div class="alumno">

            <b>
                ${a.nombre}
            </b>

            <p style="margin-top:10px;">

                ✅ Calificación:
                <b>
                    ${yaCalificado.calificacion}
                </b>

            </p>

            <select
id="asistencia-${a._id}"
>

    <option value="Presente">
        ✅ Presente
    </option>

    <option value="Retardo">
        ⏰ Retardo
    </option>

    <option value="Falta">
        ❌ Falta
    </option>

</select>

<button
class="action"

style="margin-top:10px;"

onclick="
guardarAsistencia(
    '${clase._id}',
    '${a._id}'
)
"
>

    Guardar asistencia

</button>

        </div>
        `
    }

    return `

    <div class="alumno">

        <b>
            ${a.nombre}
        </b>

        <input
            type="number"
            id="cal-${clase._id}-${a._id}"
            placeholder="Calificación"
        >

        <button
            class="action"

            onclick="guardarCalificacion(

                '${clase._id}',

                '${a._id}',

                '${a._id}'
            )"
        >

            Guardar calificación

        </button>

        <select
id="asistencia-${a._id}"
style="
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-top:10px;
"
>

<option value="Presente">
✅ Presente
</option>

<option value="Retardo">
⏰ Retardo
</option>

<option value="Falta">
❌ Falta
</option>

</select>

<button
class="action"
style="margin-top:10px;"
onclick="
guardarAsistencia(
'${clase._id}',
'${a._id}'
)
"
>

Guardar asistencia

</button>

    </div>
    `
}).join('')}

        </div>

        `
    }
}

async function guardarCalificacion(

    claseId,

    alumnoId,

    usuarioId

){

    const calificacion =
    document.getElementById(

        `cal-${claseId}-${usuarioId}`

    ).value

    const res =
    await fetch(

        `${API}/calificaciones`,

        {

            method:'POST',

            headers:{

                'Content-Type':'application/json',

                Authorization:token
            },

            body:JSON.stringify({

                claseId,

                alumnoId,

                parcial:1,

                calificacion
            })
        }
    )

    const data =
    await res.json()

    alert(data.mensaje)

    // 🔥 RECARGAR CLASES AUTOMÁTICAMENTE

    cargarClases()
}

function logout(){

    localStorage.clear()

    location.href='index.html'
}

cargarClases()

async function guardarAsistencia(

    claseId,

    alumnoId

){

    const estado =
    document.getElementById(

        `asistencia-${alumnoId}`

    ).value

    const fecha =
    new Date()

    .toISOString()

    .split('T')[0]

    const res =
    await fetch(

        `${API}/asistencia`,

        {

            method:'POST',

            headers:{

                'Content-Type':
                'application/json',

                Authorization:token
            },

            body:JSON.stringify({

                claseId,

                alumnoId,

                fecha,

                estado
            })
        }
    )

    const data =
    await res.json()

    alert(data.mensaje)
}

async function crearTarea(

    claseId

){

    const titulo =
    document.getElementById(

        `titulo-${claseId}`

    ).value

    const descripcion =
    document.getElementById(

        `desc-${claseId}`

    ).value

    const fechaEntrega =
    document.getElementById(

        `fecha-${claseId}`

    ).value

    const res =
    await fetch(

        `${API}/tareas`,

        {

            method:'POST',

            headers:{

                'Content-Type':
                'application/json',

                Authorization:token
            },

            body:JSON.stringify({

                claseId,

                titulo,

                descripcion,

                fechaEntrega
            })
        }
    )

    const data =
    await res.json()

    alert(data.mensaje)
}

</script>

</body>
</html>
