<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Panel Maestro</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#0f172a;
    color:white;
    display:flex;
}

.sidebar{

    width:250px;
    min-height:100vh;
    background:#111827;
    padding:20px;
}

.sidebar h1{

    margin-bottom:30px;
}

.sidebar button{

    width:100%;
    margin-bottom:15px;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#2563eb;
    color:white;
    font-size:16px;
    cursor:pointer;
}

.main{

    flex:1;
    padding:30px;
}

.card{

    background:#1e293b;
    padding:20px;
    border-radius:20px;
    margin-bottom:20px;
}

input{

    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    margin-top:10px;
    margin-bottom:10px;
}

button.action{

    background:#22c55e;
    color:white;
    border:none;
    padding:12px;
    width:100%;
    border-radius:10px;
    cursor:pointer;
}

.alumno{

    background:#334155;
    padding:15px;
    border-radius:12px;
    margin-top:10px;
}

.panelClase{

    margin-top:20px;
}

a{

    text-decoration:none;
}

</style>

</head>

<body>

<div class="sidebar">

    <h1>
        👨‍🏫 Maestro
    </h1>

    <button>
        📚 Mis clases
    </button>

    <button onclick="logout()">
        🚪 Salir
    </button>

</div>

<div class="main">

    <div class="card">

        <h2>
            📚 Mis clases
        </h2>

            <div
    id="pendientes"
    class="card"
    style="
        margin-bottom:20px;
        background:#f59e0b;
        color:white;
    "
>
    🔔 Tareas pendientes por revisar: 0
</div>

        <div id="listaClases"></div>

        <div
        id="listaEntregas"
        style="margin-top:20px;"
        ></div>

    </div>

</div>

<script>

const API =
'https://cepm-v2.onrender.com'

const token =
localStorage.getItem('token')

async function cargarClases(){

    // 🔥 CLASES

    const clases =
    await fetch(

        `${API}/clases`,

        {

            headers:{
                Authorization:token
            }
        }

    ).then(r=>r.json())

    // 🔥 ALUMNOS

    const alumnos =
    await fetch(

        `${API}/alumnos`,

        {

            headers:{
                Authorization:token
            }
        }

    ).then(r=>r.json())

    // 🔥 CALIFICACIONES

    const calificaciones =
    await fetch(

        `${API}/calificaciones`,

        {

            headers:{
                Authorization:token
            }
        }

    ).then(r=>r.json())

    // 🔥 TAREAS

    const tareas =
    await fetch(

        `${API}/tareas`,

        {

            headers:{
                Authorization:token
            }
        }

    ).then(r=>r.json())


    // MATERIAS


    const materias =
await fetch(

    `${API}/materias`,

    {

        headers:{
            Authorization:token
        }
    }

).then(r=>r.json())


// 🔥 ENTREGAS

const entregas =
await fetch(

    `${API}/entregas`,

    {

        headers:{
            Authorization:token
        }
    }

).then(r=>r.json())

const pendientes =
entregas.filter(e=>

    !e.revisada
).length

    // 🔥 TOKEN

    const maestro =
    JSON.parse(

        atob(

            token.split('.')[1]
        )
    )

    // 🔥 FILTRAR CLASES

    const misClases =
    clases.filter(c=>

        c.maestroId===maestro.id
    )

    const contenedor =
    document.getElementById(
        'listaClases'
    )

        document.getElementById(
        'pendientes'
    ).innerHTML =

    `🔔 Tareas pendientes por revisar: ${pendientes}`

    contenedor.innerHTML=''

    // 🔥 RECORRER CLASES

    for(const clase of misClases){

        const alumnosClase =
        alumnos.filter(a=>

            clase.alumnos.includes(
                a._id
            )
        )

        const tareasClase =
        tareas.filter(t=>

            t.claseId===clase._id
        )

        contenedor.innerHTML += `

        <div class="card">

          <h3>
    📘 ${
        materias.find(
            m => m._id === clase.materiaId
        )?.nombre || 'Materia'
    }
</h3>

<p style="margin-top:10px;">
    👥 Grupo: ${clase.grupo}
</p>

<p style="margin-top:10px;">
    🏆 ${alumnosClase.length} alumnos
</p>

            <!-- BOTONES -->

            <div
            style="
            display:flex;
            gap:10px;
            margin-top:20px;
            flex-wrap:wrap;
            "
            >

                <button
                class="action"

                onclick="
                mostrarPanel(
                    'calificaciones-${clase._id}'
                )
                "
                >
                    📝 Calificaciones
                </button>

                <button
                class="action"

                onclick="
                mostrarPanel(
                    'asistencia-${clase._id}'
                )
                "
                >
                    ✅ Asistencia
                </button>

                <button
                class="action"

                onclick="
                mostrarPanel(
                    'tareas-${clase._id}'
                )
                "
                >
                    📚 Tareas
                </button>

            </div>

            <!-- CALIFICACIONES -->

            <div
            id="calificaciones-${clase._id}"
            class="panelClase"
            style="display:none;"
            >

                <h3>
                    📝 Calificaciones
                </h3>

                ${alumnosClase.map(a=>{

                    const yaCalificado =
                    calificaciones.find(c=>

                        c.claseId===clase._id &&

                        c.alumnoId===a._id
                    )

                    if(yaCalificado){

                        return `

                        <div class="alumno">

                            <b>
                                ${a.nombre}
                            </b>

                            <p style="margin-top:10px;">

                                ✅ Calificación:
                                <b>
                                    ${yaCalificado.calificacion}
                                </b>

                            </p>

                        </div>

                        `
                    }

                    return `

                    <div class="alumno">

                        <b>
                            ${a.nombre}
                        </b>

                        <input
                            type="number"
                            id="cal-${clase._id}-${a._id}"
                            placeholder="Calificación"
                        >

                        <button
                            class="action"

                            onclick="
                            guardarCalificacion(
                                '${clase._id}',
                                '${a._id}',
                                '${a._id}'
                            )
                            "
                        >

                            Guardar calificación

                        </button>

                    </div>

                    `
                }).join('')}

            </div>

            <!-- ASISTENCIA -->

            <div
            id="asistencia-${clase._id}"
            class="panelClase"
            style="display:none;"
            >

                <h3>
                    ✅ Asistencia
                </h3>

                ${alumnosClase.map(a=>`

                <div class="alumno">

                    <b>
                        ${a.nombre}
                    </b>

                    <select
                    id="asistencia-${clase._id}-${a._id}"

                    style="
                    width:100%;
                    padding:12px;
                    border:none;
                    border-radius:10px;
                    margin-top:10px;
                    "
                    >

                        <option value="Presente">
                            ✅ Presente
                        </option>

                        <option value="Retardo">
                            ⏰ Retardo
                        </option>

                        <option value="Falta">
                            ❌ Falta
                        </option>

                    </select>

                    <button
                    class="action"
                    style="margin-top:10px;"

                    onclick="
                    guardarAsistencia(
                        '${clase._id}',
                        '${a._id}'
                    )
                    "
                    >

                        Guardar asistencia

                    </button>

                </div>

                `).join('')}

            </div>

            <!-- TAREAS -->

            <div
            id="tareas-${clase._id}"
            class="panelClase"
            style="display:none;"
            >

                <h3>
                    📚 Tareas
                </h3>

                <input
                    type="text"
                    id="titulo-${clase._id}"
                    placeholder="Título tarea"
                >

                <input
                    type="text"
                    id="desc-${clase._id}"
                    placeholder="Descripción"
                >

                <input
                    type="date"
                    id="fecha-${clase._id}"
                >

                <button
                    class="action"

                    onclick="
                    crearTarea(
                        '${clase._id}'
                    )
                    "
                >

                    Crear tarea

                </button>

                <div
                id="listaTareas-${clase._id}"
                style="margin-top:20px;"
                >

                ${tareasClase.map(t=>`

                <div class="alumno">

                    <h4>
                        📝 ${t.titulo}
                    </h4>

                    <p style="margin-top:10px;">
                        📅 ${t.fechaEntrega}
                    </p>

                    <button

                    class="action"

                    style="
                    margin-top:10px;
                    background:#f59e0b;
                    "

                    onclick="
                    verEntregas(
                        '${t._id}'
                    )
                    "
                    >

                        📥 Ver entregas

                    </button>

                    <button

                        class="action"

                        style="
                            margin-top:10px;
                            background:#ef4444;
                        "

                        onclick="
                        eliminarTarea(
                            '${t._id}'
                        )
                        "
                    >

                        🗑️ Eliminar tarea

                    </button>

                    <button

                    class="action"

                    style="
                        margin-top:10px;
                        background:#3b82f6;
                    "

                    onclick="
                    editarTarea(
                        '${t._id}',
                        '${t.titulo}',
                        '${t.descripcion}',
                        '${t.fechaEntrega}'
                    )
                    "
                >

                    ✏️ Editar tarea

                </button>

                </div>

                `).join('')}

                </div>

            </div>

        </div>

        `
    }
}

function mostrarPanel(id){

    document
    .querySelectorAll('.panelClase')

    .forEach(p=>{

        p.style.display='none'
    })

    document
    .getElementById(id)

    .style.display='block'
}

async function guardarCalificacion(

    claseId,

    alumnoId,

    usuarioId

){

    const calificacion =
    document.getElementById(

        `cal-${claseId}-${usuarioId}`

    ).value

    const res =
    await fetch(

        `${API}/calificaciones`,

        {

            method:'POST',

            headers:{

                'Content-Type':'application/json',

                Authorization:token
            },

            body:JSON.stringify({

                claseId,

                alumnoId,

                parcial:1,

                calificacion
            })
        }
    )

    const data =
    await res.json()

    alert(data.mensaje)

    cargarClases()
}

async function guardarAsistencia(

    claseId,

    alumnoId

){

    const estado =
    document.getElementById(

        `asistencia-${claseId}-${alumnoId}`

    ).value

    const fecha =
    new Date()

    .toISOString()

    .split('T')[0]

    const res =
    await fetch(

        `${API}/asistencia`,

        {

            method:'POST',

            headers:{

                'Content-Type':
                'application/json',

                Authorization:token
            },

            body:JSON.stringify({

                claseId,

                alumnoId,

                fecha,

                estado
            })
        }
    )

    const data =
    await res.json()

    alert(data.mensaje)
}

async function crearTarea(

    claseId

){

    const titulo =
    document.getElementById(

        `titulo-${claseId}`

    ).value

    const descripcion =
    document.getElementById(

        `desc-${claseId}`

    ).value

    const fechaEntrega =
    document.getElementById(

        `fecha-${claseId}`

    ).value

    const res =
    await fetch(

        `${API}/tareas`,

        {

            method:'POST',

            headers:{

                'Content-Type':
                'application/json',

                Authorization:token
            },

            body:JSON.stringify({

                claseId,

                titulo,

                descripcion,

                fechaEntrega
            })
        }
    )

    const data =
    await res.json()

    alert(data.mensaje)

    cargarClases()
}

async function eliminarTarea(

    tareaId

){

    if(

        !confirm(
            '¿Eliminar tarea?'
        )

    ) return

    const res =
    await fetch(

        `${API}/tareas/${tareaId}`,

        {

            method:'DELETE',

            headers:{
                Authorization:token
            }
        }
    )

    const data =
    await res.json()

    alert(data.mensaje)

    cargarClases()
}

    async function editarTarea(

    tareaId,

    tituloActual,

    descripcionActual,

    fechaActual

){

    const titulo =
    prompt(

        'Título',

        tituloActual
    )

    if(!titulo) return

    const descripcion =
    prompt(

        'Descripción',

        descripcionActual
    )

    if(!descripcion) return

    const fechaEntrega =
    prompt(

        'Fecha',

        fechaActual
    )

    if(!fechaEntrega) return

    const res =
    await fetch(

        `${API}/tareas/${tareaId}`,

        {

            method:'PUT',

            headers:{

                'Content-Type':
                'application/json',

                Authorization:token
            },

            body:JSON.stringify({

                titulo,

                descripcion,

                fechaEntrega
            })
        }
    )

    const data =
    await res.json()

    alert(data.mensaje)

    cargarClases()
}

async function verEntregas(

    tareaId

){

    const entregas =
    await fetch(

        `${API}/entregas/${tareaId}`,

        {

            headers:{
                Authorization:token
            }
        }

    ).then(r=>r.json())

    const div =
    document.getElementById(
        'listaEntregas'
    )

    div.innerHTML = `

    <div class="card">

        <h2>
            📥 Entregas
        </h2>

    </div>
    `

    if(entregas.length===0){

        div.innerHTML += `

        <div class="alumno">

            Nadie ha entregado 😭

        </div>
        `

        return
    }

entregas.forEach(e=>{

    div.innerHTML += `

    <div class="alumno">

        <p>
            📄 ${e.archivo}
        </p>

        <a
            href="${API}/uploads/${e.archivo}"
            target="_blank"
            style="color:#38bdf8;"
        >
            Abrir archivo
        </a>

        ${
            e.revisada

            ?

            `

            <p style="
                margin-top:15px;
                color:#22c55e;
                font-weight:bold;
            ">

                ✅ Tarea calificada

            </p>

            <p style="
                margin-top:10px;
                font-size:18px;
            ">

                📝 Calificación:
                <b>${e.calificacion}</b>

            </p>

            `

            :

            `

            <input

                type="number"

                id="cal-${e._id}"

                placeholder="Calificación"

                style="
                    margin-top:10px;
                    width:100%;
                    padding:10px;
                "
            >

            <button

                class="action"

                style="
                    margin-top:10px;
                "

                onclick="
                calificarEntrega(
                    '${e._id}'
                )
                "
            >

                ✅ Calificar

            </button>

            `
        }

    </div>
    `
})
}

async function calificarEntrega(

    entregaId

){

    const calificacion =
    document.getElementById(

        `cal-${entregaId}`

    ).value

    const res =
    await fetch(

        `${API}/entregas/${entregaId}/calificar`,

        {

            method:'PUT',

            headers:{

                'Content-Type':
                'application/json',

                Authorization:token
            },

            body:JSON.stringify({

                calificacion
            })
        }
    )

    const data =
    await res.json()

    alert(data.mensaje)
}

function logout(){

    localStorage.clear()

    location.href='index.html'
}

cargarClases()

</script>

</body>
</html>
